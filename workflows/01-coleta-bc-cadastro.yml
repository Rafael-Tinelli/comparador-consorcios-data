name: 01 · Coleta BC Cadastro

on:
  workflow_dispatch:
  schedule:
    # 05:10 BRT = 08:10 UTC
    - cron: "10 8 * * *"

permissions:
  contents: write

concurrency:
  group: coleta-bc-cadastro
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure runtime directories
        run: |
          mkdir -p data/raw/bc/cadastro
          mkdir -p data/stage/cadastro
          mkdir -p data/runtime

      - name: Run collector
        id: collect
        run: |
          python collectors/bc_cadastro_admins.py \
            --config config/sources.json \
            --source bc_cadastro_admins

      - name: Upload collector outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bc-cadastro-output
          path: |
            data/raw/bc/cadastro/latest.json
            data/stage/cadastro/instituicoes_cadastro.json
            data/runtime/bc_cadastro_admins.json
          if-no-files-found: warn
          retention-days: 15

      - name: Commit changed outputs
        if: steps.collect.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # data/raw e data/stage estão ignorados localmente no projeto,
          # então aqui usamos git add -f apenas para os artefatos canônicos.
          git add -f \
            data/raw/bc/cadastro/latest.json \
            data/stage/cadastro/instituicoes_cadastro.json

          if git diff --cached --quiet; then
            echo "Sem diff rastreável para commit."
            exit 0
          fi

          git commit -m "chore(data): atualiza cadastro BC"
          git push
