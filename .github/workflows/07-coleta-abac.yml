name: 07 · Coleta ABAC

on:
  workflow_dispatch:
  schedule:
    # 06:50 BRT = 09:50 UTC
    - cron: "50 9 15 * *"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: coleta-abac-boletim
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure runtime directories
        run: |
          mkdir -p data/raw/abac/boletim
          mkdir -p data/stage/abac/boletim
          mkdir -p data/runtime

      - name: Run collector
        id: collect
        run: |
          python collectors/abac_boletim.py \
            --config config/sources.json \
            --source abac_boletim

      - name: Upload collector outputs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: abac-boletim-output
          path: |
            data/raw/abac/boletim/latest.json
            data/raw/abac/boletim/latest_source.pdf
            data/stage/abac/boletim/abac_boletim.json
            data/runtime/abac_boletim.json
          if-no-files-found: warn
          retention-days: 15

      - name: Fail if mode used is not homologated
        if: steps.collect.outputs.mode_used != 'materials-page-download'
        run: |
          echo "Falha: a coleta não concluiu pelo modo homologado."
          echo "mode_used=${{ steps.collect.outputs.mode_used }}"
          exit 1

      - name: Commit changed outputs
        if: steps.collect.outputs.changed == 'true' && steps.collect.outputs.mode_used == 'materials-page-download'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -f \
            data/raw/abac/boletim/latest.json \
            data/raw/abac/boletim/latest_source.pdf \
            data/stage/abac/boletim/abac_boletim.json

          if git diff --cached --quiet; then
            echo "Sem diff rastreável para commit."
            exit 0
          fi

          git commit -m "chore(data): atualiza boletim ABAC"
          git push
