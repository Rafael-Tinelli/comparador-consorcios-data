name: 01 · Coleta BC Cadastro

on:
  workflow_dispatch:
  schedule:
    # 05:27 BRT = 08:27 UTC
    # Horário levemente deslocado para reduzir colisão com instabilidades pontuais do endpoint BC/Olinda.
    - cron: "27 8 * * *"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: coleta-bc-cadastro
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure runtime directories
        run: |
          mkdir -p data/raw/bc/cadastro
          mkdir -p data/stage/cadastro
          mkdir -p data/runtime

      - name: Run collector
        id: collect
        shell: bash
        run: |
          set -Eeuo pipefail

          attempts=2
          delay_seconds=300

          for attempt in $(seq 1 "$attempts"); do
            echo "::group::Coleta BC Cadastro — tentativa ${attempt}/${attempts}"

            set +e
            python collectors/bc_cadastro_admins.py \
              --config config/sources.json \
              --source bc_cadastro_admins
            status=$?
            set -e

            echo "::endgroup::"

            if [ "$status" -eq 0 ]; then
              echo "Coleta BC Cadastro concluída com sucesso na tentativa ${attempt}/${attempts}."
              exit 0
            fi

            if [ "$attempt" -lt "$attempts" ]; then
              echo "Tentativa ${attempt}/${attempts} falhou com status ${status}."
              echo "Aguardando ${delay_seconds}s antes de nova tentativa..."
              sleep "$delay_seconds"
            else
              echo "Falha final da Coleta BC Cadastro após ${attempts} tentativas."
              exit "$status"
            fi
          done

      - name: Upload collector outputs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: bc-cadastro-output
          path: |
            data/raw/bc/cadastro/latest.json
            data/stage/cadastro/instituicoes_cadastro.json
            data/runtime/bc_cadastro_admins.json
          if-no-files-found: warn
          retention-days: 15

      - name: Fail if mode used is not homologated CSV
        if: steps.collect.outputs.mode_used != 'odata-csv'
        run: |
          echo "Falha: a coleta não concluiu pelo modo homologado."
          echo "mode_used=${{ steps.collect.outputs.mode_used }}"
          exit 1

      - name: Commit changed outputs
        if: steps.collect.outputs.changed == 'true' && steps.collect.outputs.mode_used == 'odata-csv'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -f \
            data/raw/bc/cadastro/latest.json \
            data/stage/cadastro/instituicoes_cadastro.json

          if git diff --cached --quiet; then
            echo "Sem diff rastreável para commit."
            exit 0
          fi

          git commit -m "chore(data): atualiza cadastro BC"
          git push
