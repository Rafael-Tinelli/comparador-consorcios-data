name: 04 · Coleta ConsorcioBD

on:
  workflow_dispatch:
  schedule:
    # 06:00 BRT = 09:00 UTC
    # Rodando no dia 12 para ficar depois da janela informada pelo BCB
    - cron: "0 9 12 * *"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: coleta-consorciobd
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure runtime directories
        run: |
          mkdir -p data/raw/bc/consorciobd
          mkdir -p data/stage/consorciobd
          mkdir -p data/runtime

      - name: Run collector
        id: collect
        run: |
          python collectors/bc_consorciobd.py \
            --config config/sources.json \
            --source bc_consorciobd

      - name: Upload collector outputs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: bc-consorciobd-output
          path: |
            data/raw/bc/consorciobd/latest.json
            data/raw/bc/consorciobd/latest_source.bin
            data/stage/consorciobd/consorciobd_catalog.json
            data/runtime/bc_consorciobd.json
          if-no-files-found: warn
          retention-days: 15

      - name: Fail if mode used is not homologated
        if: steps.collect.outputs.mode_used != 'direct-content-download'
        run: |
          echo "Falha: a coleta não concluiu pelo modo homologado."
          echo "mode_used=${{ steps.collect.outputs.mode_used }}"
          exit 1

      - name: Commit changed outputs
        if: steps.collect.outputs.changed == 'true' && steps.collect.outputs.mode_used == 'direct-content-download'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -f \
            data/raw/bc/consorciobd/latest.json \
            data/raw/bc/consorciobd/latest_source.bin \
            data/stage/consorciobd/consorciobd_catalog.json

          if git diff --cached --quiet; then
            echo "Sem diff rastreável para commit."
            exit 0
          fi

          git commit -m "chore(data): atualiza ConsorcioBD mensal"
          git push
