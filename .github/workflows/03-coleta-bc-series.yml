name: 03 · Coleta BC Series

on:
  workflow_dispatch:
  schedule:
    # 05:35 BRT = 08:35 UTC
    - cron: "35 8 * * *"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: coleta-bc-series
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure runtime directories
        run: |
          mkdir -p data/raw/bc/series
          mkdir -p data/stage/series
          mkdir -p data/runtime

      - name: Run collector
        id: collect
        run: |
          python collectors/bc_sgs_series.py \
            --config config/sources.json \
            --source bc_sgs_series

      - name: Upload collector outputs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: bc-series-output
          path: |
            data/raw/bc/series/latest.json
            data/stage/series/series.json
            data/runtime/bc_sgs_series.json
          if-no-files-found: warn
          retention-days: 15

      - name: Fail if mode used is not homologated
        if: steps.collect.outputs.mode_used != 'sgs-json-range'
        run: |
          echo "Falha: a coleta não concluiu pelo modo homologado."
          echo "mode_used=${{ steps.collect.outputs.mode_used }}"
          exit 1

      - name: Commit changed outputs
        if: steps.collect.outputs.changed == 'true' && steps.collect.outputs.mode_used == 'sgs-json-range'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -f \
            data/raw/bc/series/latest.json \
            data/stage/series/series.json

          if git diff --cached --quiet; then
            echo "Sem diff rastreável para commit."
            exit 0
          fi

          git commit -m "chore(data): atualiza séries SGS"
          git push
