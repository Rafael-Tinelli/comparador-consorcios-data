name: 05 · Coleta ConsorcioBD Trimestral

on:
  workflow_dispatch:
  schedule:
    # 06:20 BRT = 09:20 UTC
    # Rodando em fev/mai/ago/nov, após a janela operacional informada pelo BCB
    - cron: "20 9 12 2,5,8,11 *"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: coleta-consorciobd-trimestral
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure runtime directories
        run: |
          mkdir -p data/raw/bc/consorciobd_trimestral
          mkdir -p data/stage/consorciobd_trimestral
          mkdir -p data/runtime

      - name: Run collector
        id: collect
        run: |
          python collectors/bc_consorciobd_trimestral.py \
            --config config/sources.json \
            --source bc_consorciobd_trimestral

      - name: Upload collector outputs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: bc-consorciobd-trimestral-output
          path: |
            data/raw/bc/consorciobd_trimestral/latest.json
            data/raw/bc/consorciobd_trimestral/latest_uf.bin
            data/raw/bc/consorciobd_trimestral/latest_adm.bin
            data/stage/consorciobd_trimestral/consorciobd_trimestral_catalog.json
            data/runtime/bc_consorciobd_trimestral.json
          if-no-files-found: warn
          retention-days: 15

      - name: Fail if mode used is not homologated
        if: steps.collect.outputs.mode_used != 'direct-content-download'
        run: |
          echo "Falha: a coleta não concluiu pelo modo homologado."
          echo "mode_used=${{ steps.collect.outputs.mode_used }}"
          exit 1

      - name: Commit changed outputs
        if: steps.collect.outputs.changed == 'true' && steps.collect.outputs.mode_used == 'direct-content-download'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -f \
            data/raw/bc/consorciobd_trimestral/latest.json \
            data/raw/bc/consorciobd_trimestral/latest_uf.bin \
            data/raw/bc/consorciobd_trimestral/latest_adm.bin \
            data/stage/consorciobd_trimestral/consorciobd_trimestral_catalog.json

          if git diff --cached --quiet; then
            echo "Sem diff rastreável para commit."
            exit 0
          fi

          git commit -m "chore(data): atualiza ConsorcioBD trimestral"
          git push
